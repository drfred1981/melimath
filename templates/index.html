<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeliMath</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --timer-color: #0d6efd;
        }
        body {
            background: #f0f4ff;
            user-select: none;
            -webkit-user-select: none;
        }
        .navbar-brand {
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: 1px;
        }
        .nav-tabs {
            flex-wrap: wrap;
        }
        .nav-tabs .nav-link {
            font-size: 0.95rem;
            font-weight: 600;
            padding: 0.4rem 0.7rem;
        }
        .game-area {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Timer */
        .timer-bar-container {
            height: 18px;
            background: #dee2e6;
            border-radius: 10px;
            overflow: hidden;
        }
        .timer-bar {
            height: 100%;
            background: var(--timer-color);
            border-radius: 10px;
            transition: width 0.1s linear;
        }
        .timer-label {
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Calcul */
        .calcul-display {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .answer-display {
            font-size: 2.8rem;
            font-weight: 700;
            min-height: 60px;
            border-bottom: 4px solid #333;
            min-width: 100px;
            text-align: center;
            display: inline-block;
        }

        /* Feedback */
        .feedback {
            font-size: 1.8rem;
            font-weight: 800;
            min-height: 50px;
        }
        .feedback-correct { color: #198754; }
        .feedback-wrong { color: #dc3545; }

        /* Numeric keypad */
        .keypad { max-width: 320px; margin: 0 auto; }
        .keypad .btn {
            font-size: 1.8rem;
            font-weight: 700;
            height: 64px;
            border-radius: 12px;
        }
        @media (max-width: 400px) {
            .keypad .btn { font-size: 1.4rem; height: 54px; }
            .calcul-display { font-size: 2rem; }
            .answer-display { font-size: 2rem; }
        }

        /* Score */
        .score-bar {
            font-size: 1rem;
            font-weight: 600;
        }

        .btn-validate {
            font-size: 1.4rem;
            font-weight: 700;
            border-radius: 12px;
            height: 58px;
        }
        .btn-next {
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 12px;
            height: 58px;
        }

        /* Fractions */
        .fraction-visual {
            display: flex;
            justify-content: center;
            margin: 1rem 0;
        }
        .fraction-input-group {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            font-size: 2.2rem;
            font-weight: 800;
        }
        .fraction-input-group input {
            width: 70px;
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 2px;
        }
        .fraction-line {
            width: 70px;
            height: 4px;
            background: #333;
            margin: 4px 0;
        }
        .vf-btn {
            font-size: 1.5rem;
            font-weight: 700;
            border-radius: 12px;
            padding: 12px 40px;
        }

        /* Number line */
        .number-line-container {
            margin: 1.5rem 0;
        }

        /* Problemes */
        .problem-text {
            font-size: 1.3rem;
            font-weight: 500;
            line-height: 1.6;
            padding: 1rem;
            background: #fff;
            border-radius: 12px;
            border: 2px solid #dee2e6;
            text-align: left;
        }
        .problem-question {
            font-weight: 700;
            color: #0d6efd;
            margin-top: 0.5rem;
        }

        /* Diagrammes */
        .chart-container {
            background: #fff;
            border-radius: 12px;
            border: 2px solid #dee2e6;
            padding: 1rem;
            margin: 1rem 0;
        }
        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 12px;
            height: 200px;
            padding: 0 10px;
        }
        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 70px;
        }
        .bar-rect {
            width: 100%;
            border-radius: 6px 6px 0 0;
            transition: height 0.5s ease;
        }
        .bar-value {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }
        .bar-label {
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 6px;
            text-align: center;
            word-break: break-word;
        }
        .diagram-question {
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            padding: 0.8rem;
            background: #e8f0fe;
            border-radius: 10px;
        }

        /* Addition en colonne */
        .column-add {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 2.4rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            margin: 0 auto;
            max-width: 280px;
            padding: 0.5rem 1rem;
        }
        .column-add .row-num {
            display: flex;
            letter-spacing: 8px;
        }
        .column-add .row-op {
            display: flex;
            width: 100%;
            justify-content: flex-end;
            align-items: center;
        }
        .column-add .op-sign {
            position: absolute;
            left: 0;
        }
        .column-add .separator {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 4px 0;
        }
        .column-add .answer-row {
            display: flex;
            letter-spacing: 0;
        }
        .column-add .answer-row input {
            width: 42px;
            height: 48px;
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            border: 2px solid #999;
            border-radius: 8px;
            margin: 0 2px;
            padding: 0;
        }
        .column-add .answer-row input:focus {
            border-color: #0d6efd;
            outline: none;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.25);
        }
        .column-add .answer-row input.correct-digit { background: #d4edda; border-color: #198754; }
        .column-add .answer-row input.wrong-digit { background: #f8d7da; border-color: #dc3545; }
        .column-add .carry-row {
            display: flex;
            font-size: 1.1rem;
            color: #999;
            height: 24px;
        }
        .column-add .carry-row span {
            width: 42px;
            text-align: center;
            margin: 0 2px;
        }
        .borrow-indicator {
            font-size: 0.45em;
            font-weight: 700;
            color: #dc3545;
            vertical-align: super;
            margin-right: -2px;
        }
        .borrow-added {
            font-size: 0.45em;
            font-weight: 700;
            color: #0d6efd;
            vertical-align: super;
            margin-right: -2px;
        }

        /* Conversions */
        .conversion-container {
            background: #fff;
            border-radius: 12px;
            border: 2px solid #dee2e6;
            padding: 1.5rem;
            margin: 1rem 0;
            text-align: center;
        }
        .conversion-question { font-size: 1.8rem; font-weight: 700; margin-bottom: 1rem; }
        .conversion-hint { font-size: 0.95rem; color: #6c757d; margin-bottom: 0.5rem; }
        .unit-ruler {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin: 1rem 0;
        }
        .unit-box {
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            border: 2px solid #dee2e6;
            background: #f8f9fa;
        }
        .unit-box.active-unit { background: #0d6efd; color: #fff; border-color: #0d6efd; }
        .unit-box.target-unit { background: #198754; color: #fff; border-color: #198754; }
        .unit-arrow { font-size: 1.2rem; color: #6c757d; }

        /* Geometrie */
        .geo-svg-container {
            background: #fff;
            border-radius: 12px;
            border: 2px solid #dee2e6;
            padding: 1rem;
            margin: 1rem 0;
            text-align: center;
        }
        .geo-question {
            font-size: 1.25rem;
            font-weight: 600;
            text-align: center;
            padding: 0.75rem;
            background: #e8f0fe;
            border-radius: 10px;
            margin-bottom: 0.75rem;
        }
        .geo-choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 0.5rem;
        }
        .geo-choices .btn {
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            padding: 14px 10px;
        }
        .geo-vf-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 0.5rem;
        }

        /* Francais */
        .fr-sentence {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            padding: 1rem;
            background: #fff;
            border-radius: 12px;
            border: 2px solid #dee2e6;
            margin: 1rem 0;
        }
        .fr-blank {
            display: inline-block;
            min-width: 120px;
            border-bottom: 3px solid #0d6efd;
            color: #0d6efd;
        }
        .fr-hint {
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            color: #6c757d;
            margin-bottom: 0.75rem;
        }
        .fr-choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 0.5rem;
        }
        .fr-choices .btn {
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 12px;
            padding: 14px 8px;
        }
        .fr-terminaison-area {
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .fr-terminaison-area .fr-radical {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .fr-terminaison-area input {
            font-size: 1.8rem;
            font-weight: 800;
            width: 140px;
            display: inline-block;
            border: none;
            border-bottom: 3px solid #0d6efd;
            background: transparent;
            text-align: center;
            outline: none;
            color: #0d6efd;
        }
        .fr-terminaison-area input:focus {
            border-bottom-color: #0b5ed7;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">&#x1F9EE; MeliMath</span>
    </div>
</nav>

<div class="container mt-3">
    <!-- Onglets -->
    <ul class="nav nav-tabs justify-content-center" id="modeTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" data-bs-toggle="tab" data-mode="addition"
                    type="button" role="tab">Addition</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-mode="soustraction"
                    type="button" role="tab">Soustraction</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-mode="multiplication"
                    type="button" role="tab">Multiplication</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-mode="calcul_ligne"
                    type="button" role="tab">Calcul en ligne</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-mode="addition_colonne"
                    type="button" role="tab">Addition pos&eacute;e</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-mode="soustraction_colonne"
                    type="button" role="tab">Soustraction pos&eacute;e</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-mode="conversions"
                    type="button" role="tab">Conversions</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-mode="fractions"
                    type="button" role="tab">Fractions</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-mode="problemes"
                    type="button" role="tab">Probl&egrave;mes</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-mode="diagrammes"
                    type="button" role="tab">Diagrammes</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-mode="geometrie"
                    type="button" role="tab">G&eacute;om&eacute;trie</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-mode="francais"
                    type="button" role="tab">Langage</button>
        </li>
    </ul>

    <div class="game-area mt-3">
        <!-- Score -->
        <div class="score-bar d-flex justify-content-between mb-2 px-1">
            <span>Score : <span id="score">0</span> / <span id="total">0</span></span>
            <span id="streak"></span>
        </div>

        <!-- Timer -->
        <div class="d-flex align-items-center gap-2 mb-3">
            <span class="timer-label">&#x23F3;</span>
            <div class="timer-bar-container flex-grow-1">
                <div class="timer-bar" id="timerBar" style="width:100%"></div>
            </div>
        </div>

        <!-- ====== ZONE KEYPAD (addition, soustraction, multiplication, calcul_ligne, problemes) ====== -->
        <div id="keypadMode">
            <!-- Calcul -->
            <div class="text-center mb-2" id="calculArea">
                <div class="calcul-display" id="calcul"></div>
            </div>

            <!-- Probleme text (hidden by default) -->
            <div class="d-none mb-3" id="problemArea">
                <div class="problem-text" id="problemText"></div>
            </div>

            <!-- Reponse -->
            <div class="text-center mb-3">
                <span class="answer-display" id="answerDisplay">&nbsp;</span>
            </div>

            <!-- Feedback -->
            <div class="text-center feedback mb-2" id="feedback"></div>

            <!-- Keypad -->
            <div class="keypad mb-3" id="keypadArea">
                <div class="row g-2 mb-2">
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-key="7">7</button></div>
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-key="8">8</button></div>
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-key="9">9</button></div>
                </div>
                <div class="row g-2 mb-2">
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-key="4">4</button></div>
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-key="5">5</button></div>
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-key="6">6</button></div>
                </div>
                <div class="row g-2 mb-2">
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-key="1">1</button></div>
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-key="2">2</button></div>
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-key="3">3</button></div>
                </div>
                <div class="row g-2">
                    <div class="col-4"><button class="btn btn-warning w-100" data-key="clear">&#x232B;</button></div>
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-key="0">0</button></div>
                    <div class="col-4"><button class="btn btn-warning w-100" data-key="back">&#x2190;</button></div>
                </div>
            </div>

            <!-- Validate / Next buttons (keypad modes) -->
            <div id="btnValidateArea" class="mb-3">
                <button class="btn btn-primary btn-validate w-100" id="btnValidate" disabled>Valider</button>
            </div>
            <div id="btnNextArea" class="mb-3 d-none">
                <button class="btn btn-success btn-next w-100" id="btnNext">Suivant &#x27A1;</button>
            </div>
        </div>

        <!-- ====== ZONE FRACTIONS ====== -->
        <div id="fractionsMode" class="d-none">
            <div class="text-center mb-2">
                <div class="calcul-display" id="fractionTitle" style="font-size:1.6rem;min-height:50px;"></div>
            </div>

            <!-- Visual area for shapes / number line -->
            <div class="fraction-visual" id="fractionVisual"></div>

            <!-- Fraction input (numerator/denominator) -->
            <div class="text-center mb-3 d-none" id="fractionInputArea">
                <div class="fraction-input-group">
                    <input type="number" id="fracNum" min="0" max="20" placeholder="?" aria-label="Num\u00e9rateur">
                    <div class="fraction-line"></div>
                    <input type="number" id="fracDen" min="1" max="20" placeholder="?" aria-label="D\u00e9nominateur">
                </div>
            </div>

            <!-- Vrai / Faux buttons -->
            <div class="text-center mb-3 d-none" id="vraisFauxArea">
                <button class="btn btn-success vf-btn me-3" id="btnVrai">Vrai &#x2705;</button>
                <button class="btn btn-danger vf-btn" id="btnFaux">Faux &#x274C;</button>
            </div>

            <!-- Feedback fractions -->
            <div class="text-center feedback mb-2" id="fractionFeedback"></div>

            <!-- Next button fractions -->
            <div id="btnNextFractionArea" class="mb-3 d-none">
                <button class="btn btn-success btn-next w-100" id="btnNextFraction">Suivant &#x27A1;</button>
            </div>
        </div>

        <!-- ====== ZONE ADDITION EN COLONNE ====== -->
        <div id="addColMode" class="d-none">
            <div class="text-center mb-2">
                <div class="calcul-display" id="addColTitle" style="font-size:1.4rem;min-height:40px;">Pose et calcule l'addition</div>
            </div>
            <div class="column-add" id="columnAddArea">
                <div class="carry-row" id="carryRow"></div>
                <div class="row-num" id="numRow1"></div>
                <div class="row-op" id="numRow2"></div>
                <div class="separator"></div>
                <div class="answer-row" id="answerRowCol"></div>
            </div>
            <div class="text-center feedback mb-2 mt-3" id="addColFeedback"></div>
            <div id="btnValidateAddColArea" class="mb-3 mt-2">
                <button class="btn btn-primary btn-validate w-100" id="btnValidateAddCol" disabled>Valider</button>
            </div>
            <div id="btnNextAddColArea" class="mb-3 d-none">
                <button class="btn btn-success btn-next w-100" id="btnNextAddCol">Suivant &#x27A1;</button>
            </div>
        </div>

        <!-- ====== ZONE SOUSTRACTION EN COLONNE ====== -->
        <div id="subColMode" class="d-none">
            <div class="text-center mb-2">
                <div class="calcul-display" id="subColTitle" style="font-size:1.4rem;min-height:40px;">Pose et calcule la soustraction</div>
            </div>
            <div class="column-add" id="columnSubArea">
                <div class="carry-row" id="borrowRow"></div>
                <div class="row-num" id="subNumRow1"></div>
                <div class="row-op" id="subNumRow2"></div>
                <div class="separator"></div>
                <div class="answer-row" id="answerRowSub"></div>
            </div>
            <div class="text-center feedback mb-2 mt-3" id="subColFeedback"></div>
            <div id="btnValidateSubColArea" class="mb-3 mt-2">
                <button class="btn btn-primary btn-validate w-100" id="btnValidateSubCol" disabled>Valider</button>
            </div>
            <div id="btnNextSubColArea" class="mb-3 d-none">
                <button class="btn btn-success btn-next w-100" id="btnNextSubCol">Suivant &#x27A1;</button>
            </div>
        </div>

        <!-- ====== ZONE CONVERSIONS ====== -->
        <div id="conversionsMode" class="d-none">
            <div class="conversion-container">
                <div class="unit-ruler" id="unitRuler"></div>
                <div class="conversion-question" id="conversionQ"></div>
                <div class="conversion-hint" id="conversionHint"></div>
            </div>
            <div class="text-center mb-3">
                <span class="answer-display" id="conversionAnswer" style="font-size:2.2rem;">&nbsp;</span>
            </div>
            <div class="text-center feedback mb-2" id="conversionFeedback"></div>
            <div class="keypad mb-3" id="conversionKeypad">
                <div class="row g-2 mb-2">
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-ckey="7">7</button></div>
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-ckey="8">8</button></div>
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-ckey="9">9</button></div>
                </div>
                <div class="row g-2 mb-2">
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-ckey="4">4</button></div>
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-ckey="5">5</button></div>
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-ckey="6">6</button></div>
                </div>
                <div class="row g-2 mb-2">
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-ckey="1">1</button></div>
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-ckey="2">2</button></div>
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-ckey="3">3</button></div>
                </div>
                <div class="row g-2">
                    <div class="col-4"><button class="btn btn-warning w-100" data-ckey="clear">&#x232B;</button></div>
                    <div class="col-4"><button class="btn btn-outline-dark w-100" data-ckey="0">0</button></div>
                    <div class="col-4"><button class="btn btn-warning w-100" data-ckey="back">&#x2190;</button></div>
                </div>
            </div>
            <div id="btnValidateConvArea" class="mb-3">
                <button class="btn btn-primary btn-validate w-100" id="btnValidateConv" disabled>Valider</button>
            </div>
            <div id="btnNextConvArea" class="mb-3 d-none">
                <button class="btn btn-success btn-next w-100" id="btnNextConv">Suivant &#x27A1;</button>
            </div>
        </div>

        <!-- ====== ZONE DIAGRAMMES ====== -->
        <div id="diagrammesMode" class="d-none">
            <!-- Chart -->
            <div class="chart-container" id="chartContainer">
                <div class="bar-chart" id="barChart"></div>
            </div>

            <!-- Question -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {

    const btnNextFr = document.getElementById('btnNextFr');

    // ===================== UTILS =====================
    function randInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    function pick(arr) { return arr[randInt(0, arr.length - 1)]; }

    // ===================== TABS =====================
    function showMode() {
        keypadMode.classList.add('d-none');
        fractionsMode.classList.add('d-none');
        diagrammesMode.classList.add('d-none');
        addColMode.classList.add('d-none');
        subColMode.classList.add('d-none');
        conversionsMode.classList.add('d-none');
        geometrieMode.classList.add('d-none');
        francaisMode.classList.add('d-none');
        calculArea.classList.remove('d-none');
        problemArea.classList.add('d-none');

        if (mode === 'fractions') {
            fractionsMode.classList.remove('d-none');
            timerDuration = 30;
        } else if (mode === 'diagrammes') {
            diagrammesMode.classList.remove('d-none');
            timerDuration = 30;
        } else if (mode === 'addition_colonne') {
            addColMode.classList.remove('d-none');
            timerDuration = 40;
        } else if (mode === 'soustraction_colonne') {
            subColMode.classList.remove('d-none');
            timerDuration = 40;
        } else if (mode === 'conversions') {
            conversionsMode.classList.remove('d-none');
            timerDuration = 25;
        } else if (mode === 'geometrie') {
            geometrieMode.classList.remove('d-none');
            timerDuration = 20;
        } else if (mode === 'francais') {
            francaisMode.classList.remove('d-none');
            timerDuration = 20;
        } else if (mode === 'problemes') {
            keypadMode.classList.remove('d-none');
            calculArea.classList.add('d-none');
            problemArea.classList.remove('d-none');
            timerDuration = 45;
        } else if (mode === 'calcul_ligne') {
            keypadMode.classList.remove('d-none');
            timerDuration = 30;
        } else {
            keypadMode.classList.remove('d-none');
            timerDuration = 15;
        }
    }

    document.querySelectorAll('[data-mode]').forEach(tab => {
        tab.addEventListener('click', function () {
            document.querySelectorAll('[data-mode]').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            mode = this.dataset.mode;
            score = 0; total = 0;
            updateScore();
            showMode();
            newRound();
        });
    });

    // ===================== TIMER =====================
    function startTimer() {
        timerRemaining = timerDuration;
        elTimerBar.style.width = '100%';
        elTimerBar.style.background = '#0d6efd';
        const startTime = Date.now();
        timerInterval = setInterval(() => {
            const elapsed = (Date.now() - startTime) / 1000;
            timerRemaining = timerDuration - elapsed;
            if (timerRemaining <= 0) {
                timerRemaining = 0;
                clearInterval(timerInterval);
                timeUp();
            }
            const pct = Math.max(0, (timerRemaining / timerDuration) * 100);
            elTimerBar.style.width = pct + '%';
            if (pct < 30) elTimerBar.style.background = '#dc3545';
            else if (pct < 60) elTimerBar.style.background = '#ffc107';
        }, 50);
    }
    function stopTimer() { if (timerInterval) clearInterval(timerInterval); }

    function timeUp() {
        if (answered) return;
        answered = true;
        total++;
        updateScore();
        if (mode === 'fractions') {
            showFractionFeedback(false, true);
        } else if (mode === 'diagrammes') {
            showDiagramFeedback(false, true);
        } else if (mode === 'addition_colonne') {
            showAddColFeedback(false, true);
        } else if (mode === 'soustraction_colonne') {
            showSubColFeedback(false, true);
        } else if (mode === 'conversions') {
            showConversionFeedback(false, true);
        } else if (mode === 'geometrie') {
            showGeoFeedback(false, true);
        } else if (mode === 'francais') {
            showFrFeedback(false, true);
        } else {
            showFeedback(false, true);
            showNext();
        }
    }

    // ===================== SCORE =====================
    function updateScore() {
        elScore.textContent = score;
        elTotal.textContent = total;
    }

    // ====================================================================
    //                    KEYPAD MODES (add, sub, mul, calcul_ligne, problemes)
    // ====================================================================

    function generateQuestion() {
        if (mode === 'addition') {
            a = randInt(0, 10); b = randInt(0, 10);
            correctAnswer = a + b;
            elCalc.textContent = a + ' + ' + b + ' = ?';
        } else if (mode === 'soustraction') {
            a = randInt(0, 10); b = randInt(0, a);
            correctAnswer = a - b;
            elCalc.textContent = a + ' \u2212 ' + b + ' = ?';
        } else if (mode === 'multiplication') {
            a = randInt(0, 10); b = randInt(0, 10);
            correctAnswer = a * b;
            elCalc.textContent = a + ' \u00D7 ' + b + ' = ?';
        } else if (mode === 'calcul_ligne') {
            generateCalculLigne();
        } else if (mode === 'problemes') {
            generateProbleme();
        }
    }

    function generateCalculLigne() {
        // CE2: additions de 2 nombres (dizaines/centaines)
        const level = randInt(0, 2);
        if (level === 0) {
            // dizaines simples
            a = randInt(10, 50); b = randInt(10, 50);
        } else if (level === 1) {
            // avec retenue
            a = randInt(20, 99); b = randInt(10, 99);
        } else {
            // centaines
            a = randInt(100, 500); b = randInt(100, 499);
        }
        correctAnswer = a + b;
        elCalc.textContent = a + ' + ' + b + ' = ?';
    }

    function generateProbleme() {
        const templates = [
            { text: (a, b) => `${pick(['Marie','Lucas','Emma','Hugo'])} a ${a} billes. ${pick(['Son ami','Sa copine','Paul','Léa'])} lui donne ${b} billes de plus.`,
              q: 'Combien de billes a-t-il maintenant ?', op: '+', minA: 15, maxA: 80, minB: 10, maxB: 50 },
            { text: (a, b) => `Dans la classe, il y a ${a} \u00e9l\u00e8ves. ${b} \u00e9l\u00e8ves partent \u00e0 la cantine.`,
              q: 'Combien d\'\u00e9l\u00e8ves restent dans la classe ?', op: '-', minA: 20, maxA: 35, minB: 5, maxB: 15 },
            { text: (a, b) => `Un fermier r\u00e9colte ${a} pommes le matin et ${b} pommes l'apr\u00e8s-midi.`,
              q: 'Combien de pommes a-t-il r\u00e9colt\u00e9 en tout ?', op: '+', minA: 30, maxA: 150, minB: 20, maxB: 100 },
            { text: (a, b) => `Un magasin a ${a} jouets. Il en vend ${b} pendant la journ\u00e9e.`,
              q: 'Combien de jouets reste-t-il ?', op: '-', minA: 50, maxA: 200, minB: 10, maxB: 80 },
            { text: (a, b) => `La biblioth\u00e8que re\u00e7oit ${a} nouveaux livres lundi et ${b} livres mardi.`,
              q: 'Combien de nouveaux livres en tout ?', op: '+', minA: 20, maxA: 120, minB: 15, maxB: 80 },
            { text: (a, b) => `${pick(['Léo','Manon','Jade','Nathan'])} avait ${a} images. Il en donne ${b} \u00e0 son fr\u00e8re.`,
              q: 'Combien d\'images lui reste-t-il ?', op: '-', minA: 30, maxA: 100, minB: 5, maxB: 40 },
            { text: (a, b) => `Un car transporte ${a} passagers. Au prochain arr\u00eat, ${b} passagers montent.`,
              q: 'Combien de passagers y a-t-il maintenant ?', op: '+', minA: 15, maxA: 45, minB: 5, maxB: 20 },
            { text: (a, b) => `Il y a ${a} g\u00e2teaux pour la f\u00eate. Les enfants en mangent ${b}.`,
              q: 'Combien de g\u00e2teaux reste-t-il ?', op: '-', minA: 20, maxA: 60, minB: 5, maxB: 30 },
        ];
        const t = pick(templates);
        a = randInt(t.minA, t.maxA);
        b = randInt(t.minB, Math.min(t.maxB, t.op === '-' ? a - 1 : t.maxB));
        correctAnswer = t.op === '+' ? a + b : a - b;
        problemText.innerHTML = '<p>' + t.text(a, b) + '</p><p class="problem-question">' + t.q + '</p>';
    }

    // --- Answer input ---
    function setAnswer(val) {
        userAnswer = val;
        elAnswer.textContent = val || '\u00A0';
        btnValidate.disabled = val.length === 0;

    document.getElementById('keypadArea').addEventListener('click', function (e) {
        const btn = e.target.closest('[data-key]');

        const key = btn.dataset.key;

        else if (key === 'back') setAnswer(userAnswer.slice(0, -1));
        else if (userAnswer.length < 4) setAnswer(userAnswer + key);
    });

    document.addEventListener('keydown', function (e) {
        if (mode === 'fractions' || mode === 'diagrammes' || mode === 'addition_colonne' || mode === 'soustraction_colonne' || mode === 'geometrie' || mode === 'francais') {
            if (mode === 'diagrammes') handleDiagramKey(e);
            return;
        }
        if (mode === 'conversions') {
            handleConversionKey(e);
            return;
        }
        if (answered && e.key === 'Enter') { btnNext.click(); return; }
        if (answered) return;
        if (e.key >= '0' && e.key <= '9') {
            if (userAnswer.length < 4) setAnswer(userAnswer + e.key);
        } else if (e.key === 'Backspace') {
            setAnswer(userAnswer.slice(0, -1));
        } else if (e.key === 'Enter' && userAnswer.length > 0) {
            validateAnswer();
        }
    });

        if (fractionType === 'colored') generateFractionColored();
        else if (fractionType === 'whole') generateFractionWhole();
        else generateFractionNumberLine();
    }

    function enableFractionInputs(enabled) {
        fracNum.disabled = !enabled;
        fracDen.disabled = !enabled;
        document.getElementById('btnVrai').disabled = !enabled;
        document.getElementById('btnFaux').disabled = !enabled;
    }

    // --- Type 1: Quelle fraction est coloriée ? ---
    function generateFractionColored() {
        fractionTitle.textContent = 'Quelle fraction est colori\u00e9e ?';
        const den = pick([2, 3, 4, 5, 6, 8]);
        const num = randInt(1, den - 1);
        fractionCorrect = { num, den };

        // Draw rectangle divided into parts
        const w = 300, h = 80, gap = 2;
        const partW = (w - gap * (den - 1)) / den;
        let svg = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`;
        for (let i = 0; i < den; i++) {
            const x = i * (partW + gap);
            const fill = i < num ? '#4CAF50' : '#e0e0e0';
            const stroke = '#333';
            svg += `<rect x="${x}" y="0" width="${partW}" height="${h}" rx="6" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`;
        }
        svg += '</svg>';
        fractionVisual.innerHTML = svg;
        fractionInputArea.classList.remove('d-none');
    }

    // --- Type 2: Fraction = entier ? Vrai ou Faux ---
    function generateFractionWhole() {
        const den = pick([2, 3, 4, 5, 6]);
        const isTrue = Math.random() < 0.5;
        let num, wholeNum;
        if (isTrue) {
            wholeNum = randInt(1, 3);
            num = wholeNum * den;
        } else {
            wholeNum = randInt(1, 3);
            num = wholeNum * den + randInt(1, den - 1);
        }
        fractionCorrect = isTrue;

        fractionTitle.innerHTML = `Est-ce que <b>${num}/${den} = ${wholeNum}</b> entier${wholeNum > 1 ? 's' : ''} ?`;

        // Visual: show the fraction as colored shapes
        const total = num > 12 ? Math.min(num, 18) : num;
        const displayDen = den;
        const w = 320, partH = 30, rowGap = 8;
        const rows = Math.ceil(total / displayDen);
        const svgH = rows * (partH + rowGap);
        const partW = (w - 2 * (displayDen - 1)) / displayDen;

        let svg = `<svg width="${w}" height="${svgH}" viewBox="0 0 ${w} ${svgH}">`;
        for (let i = 0; i < total; i++) {
            const row = Math.floor(i / displayDen);
            const col = i % displayDen;
            const x = col * (partW + 2);
            const y = row * (partH + rowGap);
            svg += `<rect x="${x}" y="${y}" width="${partW}" height="${partH}" rx="4" fill="#4CAF50" stroke="#333" stroke-width="1.5"/>`;
        }
        svg += '</svg>';
        fractionVisual.innerHTML = svg;
        vraisFauxArea.classList.remove('d-none');
    }

    // --- Type 3: Fraction sur ligne numérique ---
    function generateFractionNumberLine() {
        const den = pick([2, 3, 4, 5, 6, 8, 10]);
        const actualNum = randInt(1, den - 1);
        const isTrue = Math.random() < 0.5;
        let shownNum;
        if (isTrue) {
            shownNum = actualNum;
        } else {
            do { shownNum = randInt(1, den - 1); } while (shownNum === actualNum);
        }
        fractionCorrect = isTrue;

        fractionTitle.innerHTML = `La fl\u00e8che montre-t-elle <b>${shownNum}/${den}</b> ?`;

        // Draw number line from 0 to 1
        const w = 340, h = 80;
        const margin = 30;
        const lineY = 50;
        const lineW = w - 2 * margin;

        let svg = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`;
        // Main line
        svg += `<line x1="${margin}" y1="${lineY}" x2="${w - margin}" y2="${lineY}" stroke="#333" stroke-width="3"/>`;
        // Ticks and labels
        for (let i = 0; i <= den; i++) {
            const x = margin + (i / den) * lineW;
            svg += `<line x1="${x}" y1="${lineY - 10}" x2="${x}" y2="${lineY + 10}" stroke="#333" stroke-width="2"/>`;
            if (i === 0) svg += `<text x="${x}" y="${lineY + 28}" text-anchor="middle" font-size="14" font-weight="600">0</text>`;
            else if (i === den) svg += `<text x="${x}" y="${lineY + 28}" text-anchor="middle" font-size="14" font-weight="600">1</text>`;
        }
        // Arrow at actual position
        const arrowX = margin + (actualNum / den) * lineW;
        svg += `<polygon points="${arrowX - 8},18 ${arrowX + 8},18 ${arrowX},${lineY - 12}" fill="#dc3545"/>`;
        svg += `<line x1="${arrowX}" y1="0" x2="${arrowX}" y2="18" stroke="#dc3545" stroke-width="3"/>`;
        svg += '</svg>';

        fractionVisual.innerHTML = svg;
        vraisFauxArea.classList.remove('d-none');
    }

    function generateDiagram() {
        diagramFeedbackEl.textContent = '';

        // Pick theme and generate data
        const theme = pick(diagramThemes);
        const numBars = randInt(3, 5);
        const cats = theme.cats.slice(0, numBars);
        diagramData = cats.map(c => ({ label: c, value: randInt(2, 20) }));

        // Draw bars
        const maxVal = Math.max(...diagramData.map(d => d.value));
        const maxH = 160;
        barChart.innerHTML = '';
        diagramData.forEach((d, i) => {
            const barH = (d.value / maxVal) * maxH;
            const div = document.createElement('div');
            div.className = 'bar-item';
            div.innerHTML = `
                <div class="bar-value">${d.value}</div>
                <div class="bar-rect" style="height:${barH}px;background:${barColors[i % barColors.length]}"></div>
                <div class="bar-label">${d.label}</div>
            `;
            barChart.appendChild(div);
        });

        // Generate question
        const qTypes = ['diff', 'total', 'sum_two'];
        const qType = pick(qTypes);

        if (qType === 'diff') {
            const i1 = randInt(0, diagramData.length - 1);
            let i2;
            do { i2 = randInt(0, diagramData.length - 1); } while (i2 === i1);
            const bigger = diagramData[i1].value >= diagramData[i2].value ? i1 : i2;
            const smaller = bigger === i1 ? i2 : i1;
            correctAnswer = diagramData[bigger].value - diagramData[smaller].value;
            diagramQuestion.textContent = `Combien de plus y a-t-il de ${diagramData[bigger].label} que de ${diagramData[smaller].label} ?`;
        } else if (qType === 'total') {
            correctAnswer = diagramData.reduce((s, d) => s + d.value, 0);
            diagramQuestion.textContent = 'Quel est le total de toutes les cat\u00e9gories ?';
        } else {
            const i1 = randInt(0, diagramData.length - 1);
            let i2;
            do { i2 = randInt(0, diagramData.length - 1); } while (i2 === i1);
            correctAnswer = diagramData[i1].value + diagramData[i2].value;
            diagramQuestion.textContent = `Combien y a-t-il de ${diagramData[i1].label} et de ${diagramData[i2].label} en tout ?`;

            if (carry && i > 0) carries[i - 1] = '1';

        const carrySpans = carryRow.querySelectorAll('span');
        carrySpans.forEach((sp, i) => { sp.textContent = carries[i]; });

    function validateSubCol() {
        if (answered) return;
        const inputs = answerRowSub.querySelectorAll('input');
        let userStr = '';
        inputs.forEach(inp => { userStr += inp.value || '0'; });

        answered = true;
        stopTimer();
        total++;

        const userVal = parseInt(userStr, 10);
        const isCorrect = userVal === subColAnswer;
        if (isCorrect) score++;
        updateScore();

        // Color each digit - pad answer to match input length
        const ansStr = String(subColAnswer).padStart(subColDigits, '0');
        inputs.forEach((inp, i) => {
            inp.disabled = true;
            if (inp.value === ansStr[i]) {
                inp.classList.add('correct-digit');
            } else {
                inp.classList.add('wrong-digit');
            }
        });

        // Show borrows (emprunts) - notation française traditionnelle
        const aStr = String(subColA).padStart(subColDigits, '0');
        const bStr = String(subColB).padStart(subColDigits, '0');
        const aDigits = aStr.split('').map(Number);
        const borrowAt = new Array(subColDigits).fill(false);
        for (let i = subColDigits - 1; i >= 1; i--) {
            if (aDigits[i] < parseInt(bStr[i])) {
                borrowAt[i] = true;
                aDigits[i] += 10;
                aDigits[i - 1] -= 1;
            }
        }
        // Petit "1" à gauche du chiffre du haut qui emprunte
        const topSpans = subNumRow1.querySelectorAll('span');
        borrowAt.forEach((b, i) => {
            if (b && topSpans[i]) {
                const ind = document.createElement('span');
                ind.className = 'borrow-indicator';
                ind.textContent = '1';
                topSpans[i].prepend(ind);
            }
        });
        // Retenue +1 sur le chiffre du bas à gauche
        const bottomDigitSpans = Array.from(subNumRow2.querySelectorAll('span')).filter(
            sp => sp.style.width === '42px'
        );
        borrowAt.forEach((b, i) => {
            if (b && i >= 1 && bottomDigitSpans[i - 1]) {
                const ind = document.createElement('span');
                ind.className = 'borrow-added';
                ind.textContent = '+1';
                bottomDigitSpans[i - 1].prepend(ind);
            }
        });

        showSubColFeedback(isCorrect, false);
    }

            { from: 'mm', to: 'cm', gen: () => { const v = randInt(1, 30) * 10; return { v, ans: v / 10 }; }, hint: '10 mm = 1 cm' },
            { from: 'm', to: 'cm', gen: () => { const v = randInt(1, 10); return { v, ans: v * 100 }; }, hint: '1 m = 100 cm' },
            { from: 'cm', to: 'm', gen: () => { const v = randInt(1, 8) * 100; return { v, ans: v / 100 }; }, hint: '100 cm = 1 m' },
            { from: 'm', to: 'mm', gen: () => { const v = randInt(1, 5); return { v, ans: v * 1000 }; }, hint: '1 m = 1000 mm' },
            { from: 'mm', to: 'cm', gen: () => { const v = randInt(1, 20) * 10 + randInt(0, 9); return { v, ans: Math.floor(v / 10) }; }, hint: '10 mm = 1 cm (partie enti\u00e8re)' },
        ];

        const conv = pick(conversions);
        const { v, ans } = conv.gen();
        conversionCorrectAnswer = ans;

            if (i < convUnits.length - 1) {

                unitRuler.appendChild(arrow);

        const key = btn.dataset.ckey;
        if (key === 'clear') setConversionAnswer('');
        else if (key === 'back') setConversionAnswer(conversionUserAnswer.slice(0, -1));
        else if (conversionUserAnswer.length < 5) setConversionAnswer(conversionUserAnswer + key);
    });

    function handleConversionKey(e) {
        if (answered && e.key === 'Enter') { btnNextConv.click(); return; }
        if (answered) return;
        if (e.key >= '0' && e.key <= '9') {
            if (conversionUserAnswer.length < 5) setConversionAnswer(conversionUserAnswer + e.key);
        } else if (e.key === 'Backspace') {
            setConversionAnswer(conversionUserAnswer.slice(0, -1));
        } else if (e.key === 'Enter' && conversionUserAnswer.length > 0) {
            validateConversion();
        }
    }

        const shapeKey = pick(geoShapeKeys);
        const shape = geoShapes[shapeKey];

        // Draw shape
        geoSvgContainer.innerHTML = shape.svg();

        // Decide: QCM or Vrai/Faux (50/50)
        const useQcm = Math.random() < 0.5;

        if (useQcm) {
            geoQuestionType = 'qcm';
            // QCM: What is this shape?
            geoQuestionEl.textContent = 'Quelle est cette figure ?';
            geoCorrectAnswer = shape.name;

            // Build 3 wrong distractors from other shapes
            const others = geoShapeKeys.filter(k => k !== shapeKey);
            const shuffled = others.sort(() => Math.random() - 0.5).slice(0, 3);
            const choices = [shape.name, ...shuffled.map(k => geoShapes[k].name)];
            // Shuffle choices
            choices.sort(() => Math.random() - 0.5);

            geoChoicesArea.innerHTML = '';
            choices.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'btn btn-outline-primary';
                btn.textContent = c;
                btn.addEventListener('click', () => validateGeoChoice(c));
                geoChoicesArea.appendChild(btn);
            });
            geoChoicesArea.classList.remove('d-none');
        } else {
            geoQuestionType = 'vf';
            // Vrai/Faux: pick a property question
            const props = shape.props;
            const propQuestions = [
                { q: `Ce triangle a 3 c\u00f4t\u00e9s.`, ans: props.cotes === 3 },
                { q: `Ce quadrilat\u00e8re a 4 c\u00f4t\u00e9s.`, ans: props.cotes === 4 },
                { q: `Cette figure a ${props.cotesEgaux} c\u00f4t\u00e9s \u00e9gaux.`, ans: true },
                { q: `Cette figure a 4 angles droits.`, ans: props.anglesDroits === 4 },
                { q: `Cette figure a au moins 1 angle droit.`, ans: props.anglesDroits >= 1 },
                { q: `Cette figure a ${props.axesSymetrie} axe${props.axesSymetrie > 1 ? 's' : ''} de sym\u00e9trie.`, ans: true },
                { q: `Cette figure a des c\u00f4t\u00e9s parall\u00e8les.`, ans: props.parallel > 0 },
                { q: `Tous les c\u00f4t\u00e9s de cette figure sont \u00e9gaux.`, ans: props.cotesEgaux === props.cotes },
                { q: `Cette figure est un triangle.`, ans: props.cotes === 3 },
                { q: `Cette figure est un quadrilat\u00e8re.`, ans: props.cotes === 4 },
            ].filter(pq => {
                // Only include questions that make sense for this shape type
                if (pq.q.startsWith('Ce triangle') && props.cotes !== 3) return false;
                if (pq.q.startsWith('Ce quadrilat\u00e8re') && props.cotes !== 4) return false;
                return true;
            });

            // Randomly flip some answers to make it more interesting
            const pq = pick(propQuestions);
            let finalAns = pq.ans;
            // For "true" answers, 50% chance we flip to a wrong statement
            if (Math.random() < 0.4) {
                finalAns = !pq.ans;
                // Modify question to match
                if (!pq.ans) {
                    // was false, we flip to true → question stays but answer is now true... skip this flip
                    finalAns = pq.ans;
                }
            }
            // Actually: just pick the question as-is, the ans field is the correct boolean
            geoCorrectAnswer = pq.ans;
            geoQuestionEl.textContent = pq.q + ' Vrai ou Faux ?';
            geoVfArea.classList.remove('d-none');
        }
    }

        const verb = pick(verbKeys);

        frCorrectAnswer = correctForm;

        // Build sentence
        const complement = pick(frComplements[verb]);
        const tmpl = pick(frContextes[personne]);
        const rawSentence = tmpl(verb, complement);
        frSentenceEl.innerHTML = rawSentence.replace('___', `<span class="fr-blank">___</span>`);
        frHintEl.textContent = 'Verbe : ' + verb + ' \u2014 \u00e0 l\u2019imparfait';

        // Randomly pick sub-mode: QCM or terminaison
        frSubMode = Math.random() < 0.5 ? 'qcm' : 'terminaison';

        if (frSubMode === 'terminaison') {
            // Mode terminaison: show radical, user types ending
            frChoicesArea.classList.add('d-none');
            frTerminaisonArea.classList.remove('d-none');

            const radical = frRadicaux[verb] || verb.replace(/(er|ir|re)$/, '');
            frCorrectTerminaison = frTerminaisons[personne];
            // Pour "manger" avec nous/vous, le radical perd le e
            let displayRadical = radical;
            if (verb === 'manger' && (personne === 'nous' || personne === 'vous')) {
                displayRadical = 'mang';

            frTerminaisonInput.focus();

                    if (f !== correctForm) allForms.push(f);
                });
            });

            const correctEnding = correctForm.slice(-4);
            const similar = allForms.filter(f => f.slice(-4) === correctEnding && f !== correctForm);
            const dissimilar = allForms.filter(f => f.slice(-4) !== correctEnding && f !== correctForm);

            const wrongPool = similar.length >= 3 ? similar : [...similar, ...dissimilar];
            const uniqueWrong = [...new Set(wrongPool)].filter(f => f !== correctForm);
            const shuffledWrong = uniqueWrong.sort(() => Math.random() - 0.5).slice(0, 3);

        updateScore();

        frTerminaisonInput.disabled = true;
        btnValiderTerminaison.disabled = true;

        if (isCorrect) {
            frTerminaisonInput.style.color = '#198754';
        } else {
            frTerminaisonInput.style.color = '#dc3545';
        }

        showFrFeedback(isCorrect, false);
    }

    btnValiderTerminaison.addEventListener('click', validateFrTerminaison);
    frTerminaisonInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (answered) { btnNextFr.click(); }
            else { validateFrTerminaison(); }
        }
    });

    function validateFrChoix(chosen) {
        if (answered) return;
        answered = true;
        stopTimer();
        total++;
        const isCorrect = chosen === frCorrectAnswer;
        if (isCorrect) score++;
        updateScore();

        frChoicesArea.querySelectorAll('button').forEach(btn => {
            btn.disabled = true;
            if (btn.textContent === frCorrectAnswer) {
                btn.className = 'btn btn-success';
            } else if (btn.textContent === chosen && !isCorrect) {
                btn.className = 'btn btn-danger';
            }
        });

        showFrFeedback(isCorrect, false);
    }

    function showFrFeedback(correct, timeout) {
        if (timeout) {
            frFeedbackEl.className = 'text-center feedback feedback-wrong';
            if (frSubMode === 'terminaison') {
                frFeedbackEl.textContent = 'Temps \u00e9coul\u00e9 ! Terminaison : ' + frCorrectTerminaison + ' \u2192 ' + frCorrectAnswer;
                frTerminaisonInput.disabled = true;
                btnValiderTerminaison.disabled = true;
            } else {
                frFeedbackEl.textContent = 'Temps \u00e9coul\u00e9 ! R\u00e9ponse : ' + frCorrectAnswer;
                frChoicesArea.querySelectorAll('button').forEach(btn => {
                    btn.disabled = true;
                    if (btn.textContent === frCorrectAnswer) btn.className = 'btn btn-success';
                });
            }
        } else if (correct) {
            frFeedbackEl.className = 'text-center feedback feedback-correct';
            frFeedbackEl.textContent = 'Bravo ! ' + frCorrectAnswer + ' \u2705';
        } else {
            frFeedbackEl.className = 'text-center feedback feedback-wrong';
            if (frSubMode === 'terminaison') {
                frFeedbackEl.textContent = 'Rat\u00e9 ! Terminaison : ' + frCorrectTerminaison + ' \u2192 ' + frCorrectAnswer + ' \u274C';
            } else {
                frFeedbackEl.textContent = 'Rat\u00e9 ! R\u00e9ponse : ' + frCorrectAnswer + ' \u274C';
            }
        }
        btnNextFrArea.classList.remove('d-none');
        btnNextFr.focus();
    }

    btnNextFr.addEventListener('click', newRound);

    // ====================================================================
    //                    MAIN ROUND LOGIC
    // ====================================================================

    function newRound() {
        answered = false;
        stopTimer();

        if (mode === 'fractions') {
            generateFraction();
        } else if (mode === 'diagrammes') {
            generateDiagram();
        } else if (mode === 'addition_colonne') {
            generateAdditionColonne();
        } else if (mode === 'soustraction_colonne') {
            generateSoustractionColonne();
        } else if (mode === 'conversions') {
            generateConversion();
        } else if (mode === 'geometrie') {
            generateGeometrie();
        } else if (mode === 'francais') {
            generateFrancais();
        } else {
            // Keypad modes
            userAnswer = '';
            elAnswer.textContent = '\u00A0';
            elFeedback.textContent = '';
            elFeedback.className = 'text-center feedback';
            btnValidate.disabled = true;
            btnValidateArea.classList.remove('d-none');
            btnNextArea.classList.add('d-none');
            generateQuestion();
        }
        startTimer();
    }

    // --- Init ---
    showMode();
    newRound();
})();
</script>
</body>
</html>
